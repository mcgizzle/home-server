- name: OpenClaw agent (grimes)
  gather_facts: true
  hosts: openclaw
  vars:
    openclaw_user: openclaw
    openclaw_home: /opt/openclaw
    openclaw_agent: grimes

    # --- Secrets (pass via --extra-vars or ansible-vault) ---
    telegram_bot_token: "{{ vault_telegram_bot_token | default('CHANGEME') }}"
    gemini_api_key: "{{ vault_gemini_api_key | default('CHANGEME') }}"
    anthropic_api_key: "{{ vault_anthropic_api_key | default('CHANGEME') }}"

  tasks:
    - name: Initial setup
      ansible.builtin.import_tasks:
        file: tasks/initial-setup.yml
      tags: [setup]

    - name: Install and configure OpenClaw
      ansible.builtin.import_tasks:
        file: tasks/openclaw.yml
      tags: [openclaw]

    - name: Set up cross-LXC SSH access
      ansible.builtin.import_tasks:
        file: tasks/openclaw-ssh-access.yml
      tags: [ssh-access]

- name: Authorize OpenClaw SSH key on LXCs
  gather_facts: false
  hosts: lxcs
  tags: [ssh-access]
  tasks:
    - name: Authorize OpenClaw public key
      ansible.posix.authorized_key:
        user: root
        key: "{{ hostvars['openclaw_lxc']['openclaw_lxc_pubkey']['content'] | b64decode }}"
        state: present
