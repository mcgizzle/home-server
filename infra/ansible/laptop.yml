- name: macOS Laptop Setup
  gather_facts: true
  hosts: localhost
  connection: local
  vars:
    git_user_email: mcgroas@tcd.ie
    git_user_name: mcgizzle
    dotfiles_repo: "git@github.com:mcgizzle/home-server.git"
    repo_dir: "{{ ansible_facts.env.HOME }}/code/personal/home-server"
  tasks:
    - name: Clone home-server repo
      ansible.builtin.include_tasks:
        file: tasks/home-server-repo.yml

    - name: Dotfiles
      ansible.builtin.include_tasks:
        file: tasks/dotfiles.yml

    - name: Homebrew
      ansible.builtin.include_tasks:
        file: tasks/homebrew.yml

    - name: Zsh + Zim
      ansible.builtin.include_tasks:
        file: tasks/zsh-zim.yml

    - name: Git
      ansible.builtin.include_tasks:
        file: tasks/git.yml

    - name: macOS Defaults
      ansible.builtin.include_tasks:
        file: tasks/macos-defaults.yml

    - name: App Preferences
      ansible.builtin.include_tasks:
        file: tasks/app-preferences.yml

    - name: File Associations
      ansible.builtin.include_tasks:
        file: tasks/file-associations.yml

    - name: VS Code
      ansible.builtin.include_tasks:
        file: tasks/vscode.yml

    - name: Dotfiles Sync LaunchAgent
      ansible.builtin.include_tasks:
        file: tasks/dotfiles-sync.yml

    - name: OpenClaw Daemon Reinstall LaunchAgent
      ansible.builtin.include_tasks:
        file: tasks/openclaw-daemon-reinstall.yml
