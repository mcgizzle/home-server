- name: Create VS Code User settings directory
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/Library/Application Support/Code/User"
    state: directory
    mode: "0755"

- name: Symlink VS Code settings.json from dotfiles
  ansible.builtin.file:
    src: "{{ ansible_facts.env.HOME }}/.config/vscode/settings.json"
    dest: "{{ ansible_facts.env.HOME }}/Library/Application Support/Code/User/settings.json"
    state: link
    force: true

- name: Symlink VS Code keybindings.json from dotfiles
  ansible.builtin.file:
    src: "{{ ansible_facts.env.HOME }}/.config/vscode/keybindings.json"
    dest: "{{ ansible_facts.env.HOME }}/Library/Application Support/Code/User/keybindings.json"
    state: link
    force: true
