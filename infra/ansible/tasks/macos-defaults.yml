# Dock
- name: Autohide Dock
  community.general.osx_defaults:
    domain: com.apple.dock
    key: autohide
    type: bool
    value: true

- name: Position Dock on right
  community.general.osx_defaults:
    domain: com.apple.dock
    key: orientation
    type: string
    value: right

- name: Remove Dock autohide delay
  community.general.osx_defaults:
    domain: com.apple.dock
    key: autohide-delay
    type: float
    value: 0

- name: Set hot corner bottom-right to Mission Control
  community.general.osx_defaults:
    domain: com.apple.dock
    key: wvous-br-corner
    type: int
    value: 14

- name: Set hot corner bottom-right modifier
  community.general.osx_defaults:
    domain: com.apple.dock
    key: wvous-br-modifier
    type: int
    value: 0

# Keyboard
- name: Set fastest key repeat rate
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: KeyRepeat
    type: int
    value: 2

- name: Set shortest initial key repeat delay
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: InitialKeyRepeat
    type: int
    value: 15

- name: Disable press-and-hold for accents (enables key repeat)
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: ApplePressAndHoldEnabled
    type: bool
    value: false

# Mouse
- name: Set mouse tracking speed
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: com.apple.mouse.scaling
    type: int
    value: 3

# Finder
- name: Set Finder default to list view
  community.general.osx_defaults:
    domain: com.apple.finder
    key: FXPreferredViewStyle
    type: string
    value: Nlsv

- name: Show path bar in Finder
  community.general.osx_defaults:
    domain: com.apple.finder
    key: ShowPathbar
    type: bool
    value: true

# Appearance
- name: Enable dark mode
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: AppleInterfaceStyle
    type: string
    value: Dark

# Locale
- name: Set locale to British English
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: AppleLocale
    type: string
    value: en_GB

# Screenshots
- name: Create screenshots directory
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/Documents/Screenshots"
    state: directory
    mode: "0755"

- name: Set screenshot save location
  community.general.osx_defaults:
    domain: com.apple.screencapture
    key: location
    type: string
    value: "{{ ansible_facts.env.HOME }}/Documents/Screenshots"

# Text replacements
- name: Disable screen flash for alert sound
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: com.apple.sound.beep.flash
    type: int
    value: 0

# Menu bar icon spacing (tighter icons)
- name: Reduce menu bar icon spacing
  ansible.builtin.command: defaults -currentHost write -globalDomain NSStatusItemSpacing -int 4
  changed_when: true

- name: Reduce menu bar icon selection padding
  ansible.builtin.command: defaults -currentHost write -globalDomain NSStatusItemSelectionPadding -int 4
  changed_when: true

# Apply changes
- name: Restart Dock to apply changes
  ansible.builtin.command: killall Dock
  changed_when: true

- name: Restart Finder to apply changes
  ansible.builtin.command: killall Finder
  changed_when: true
