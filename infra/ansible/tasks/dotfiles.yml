- name: Ensure stow is installed
  community.general.homebrew:
    name: stow
    state: present

- name: Clone home-server repository
  git:
    repo: "{{ dotfiles_repo }}"
    dest: "{{ repo_dir }}"
    version: master
  ignore_errors: yes

- name: Create backup directory for conflicting files
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/.config-backup"
    state: directory
    mode: "0755"

- name: Check for files that would conflict with stow
  ansible.builtin.command:
    cmd: stow --simulate -t {{ ansible_facts.env.HOME }} dotfiles
    chdir: "{{ repo_dir }}"
  register: stow_check
  ignore_errors: true
  changed_when: false

- name: Back up conflicting files
  ansible.builtin.shell: |
    cd {{ repo_dir }}
    stow --simulate -t {{ ansible_facts.env.HOME }} dotfiles 2>&1 \
      | grep 'existing target' \
      | sed 's/.*over existing target //' \
      | sed 's/ since.*//' \
      | while read -r f; do
          if [ -f "{{ ansible_facts.env.HOME }}/$f" ] && [ ! -L "{{ ansible_facts.env.HOME }}/$f" ]; then
            mkdir -p "{{ ansible_facts.env.HOME }}/.config-backup/$(dirname "$f")"
            mv "{{ ansible_facts.env.HOME }}/$f" "{{ ansible_facts.env.HOME }}/.config-backup/$f"
            echo "Backed up: $f"
          fi
        done
  when: stow_check.rc != 0
  register: backup_result
  changed_when: "'Backed up:' in backup_result.stdout"

- name: Stow dotfiles into home directory
  ansible.builtin.command:
    cmd: stow -t {{ ansible_facts.env.HOME }} dotfiles
    chdir: "{{ repo_dir }}"
  register: stow_result
  changed_when: stow_result.rc == 0
