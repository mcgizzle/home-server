## Node.js + OpenClaw install and configuration

- name: Install Node.js 22 (NodeSource)
  block:
    - name: Add NodeSource GPG key
      ansible.builtin.shell: |
        curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key | gpg --dearmor -o /usr/share/keyrings/nodesource.gpg
      args:
        creates: /usr/share/keyrings/nodesource.gpg

    - name: Add NodeSource repository
      ansible.builtin.copy:
        content: "deb [signed-by=/usr/share/keyrings/nodesource.gpg] https://deb.nodesource.com/node_22.x nodistro main\n"
        dest: /etc/apt/sources.list.d/nodesource.list

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes

    - name: Install Node.js
      ansible.builtin.apt:
        name: nodejs
        state: present

- name: Verify Node.js version
  ansible.builtin.command: node --version
  register: node_version
  changed_when: false

- name: Show Node.js version
  ansible.builtin.debug:
    msg: "Node.js version: {{ node_version.stdout }}"

- name: Create openclaw user
  ansible.builtin.user:
    name: "{{ openclaw_user }}"
    home: "{{ openclaw_home }}"
    shell: /bin/bash
    system: yes
    create_home: yes

- name: Install OpenClaw globally
  community.general.npm:
    name: openclaw
    global: yes
    state: latest

- name: Create openclaw directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: '0750'
  loop:
    - "{{ openclaw_home }}/.openclaw"
    - "{{ openclaw_home }}/.openclaw/agents"
    - "{{ openclaw_home }}/.openclaw/agents/{{ openclaw_agent }}"
    - "{{ openclaw_home }}/.openclaw/agents/{{ openclaw_agent }}/agent"
    - "{{ openclaw_home }}/.openclaw/agents/{{ openclaw_agent }}/memory"

- name: Deploy OpenClaw config
  ansible.builtin.template:
    src: openclaw/openclaw.json.j2
    dest: "{{ openclaw_home }}/.openclaw/openclaw.json"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: '0640'

- name: Deploy workspace files
  ansible.builtin.copy:
    src: "openclaw/{{ item }}"
    dest: "{{ openclaw_home }}/.openclaw/agents/{{ openclaw_agent }}/{{ item }}"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: '0640'
  loop:
    - SOUL.md
    - AGENTS.md
    - HEARTBEAT.md

- name: Install Tailscale
  block:
    - name: Add Tailscale GPG key
      ansible.builtin.shell: |
        curl -fsSL https://pkgs.tailscale.com/stable/debian/bookworm.noarmor.gpg | tee /usr/share/keyrings/tailscale-archive-keyring.gpg > /dev/null
      args:
        creates: /usr/share/keyrings/tailscale-archive-keyring.gpg

    - name: Add Tailscale repository
      ansible.builtin.copy:
        content: "deb [signed-by=/usr/share/keyrings/tailscale-archive-keyring.gpg] https://pkgs.tailscale.com/stable/debian bookworm main\n"
        dest: /etc/apt/sources.list.d/tailscale.list

    - name: Update apt and install Tailscale
      ansible.builtin.apt:
        name: tailscale
        state: present
        update_cache: yes

- name: Deploy systemd service
  ansible.builtin.template:
    src: openclaw/openclaw-gateway.service.j2
    dest: /etc/systemd/system/openclaw-gateway.service
    mode: '0644'

- name: Enable and start OpenClaw gateway
  ansible.builtin.systemd:
    name: openclaw-gateway
    enabled: yes
    state: started
    daemon_reload: yes

- name: Show next steps
  ansible.builtin.debug:
    msg: |
      ✅ OpenClaw installed and running!
      
      Next steps:
      1. SSH in and run: sudo -u {{ openclaw_user }} tailscale up
      2. Access webchat via Tailscale IP on port 18789
      3. Run: sudo -u {{ openclaw_user }} openclaw onboard (if needed)
